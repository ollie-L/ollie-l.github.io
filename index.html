<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flower Essence Diary - 客戶支援</title>
    <style>
        /* 採用簡約、乾淨的設計風格 */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            background-color: #fafaf9; /* 偏暖的白色，更有質感 */
            color: #44403c; 
        }
        .container { 
            text-align: center; 
            padding: 40px 20px; 
            background: white; 
            border-radius: 24px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.04); 
            max-width: 400px; 
            width: 85%; 
        }
        h1 { font-size: 22px; font-weight: 500; letter-spacing: 0.05em; margin-bottom: 16px; color: #1c1917; }
        p { font-size: 15px; color: #78716c; margin-bottom: 32px; line-height: 1.6; }
        .btn { 
            display: inline-block; 
            background-color: #57534e; /* 沉穩的灰褐色 */
            color: #fafaf9; 
            padding: 14px 32px; 
            border-radius: 30px; 
            text-decoration: none; 
            font-size: 15px;
            font-weight: 500; 
            transition: all 0.3s ease;
        }
        .btn:hover { background-color: #44403c; transform: translateY(-1px); }
        .footer { margin-top: 40px; font-size: 12px; color: #a8a29e; }
    </style>
</head>
<body>
    <div class="container">
        <h1>巴赫花精日記</h1>
        <p>希望能陪伴您記錄每一刻的情緒起伏。<br>若有任何使用上的建議或問題，<br>歡迎點擊下方按鈕回報給我們。</p>
        
        <a href="https://forms.gle/K2Fbjnn9DaUcXQ9XA" target="_blank" class="btn">聯絡客戶支援</a>
        
        <div class="footer">© 2026 Olliel</div>
    </div>
</body>
</html>
